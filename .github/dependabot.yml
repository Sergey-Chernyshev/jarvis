version: 2
updates:
  # Rust-зависимости приложения.
  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # npm (Tauri CLI и т.п.).
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # Версии GitHub Actions в workflow.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
