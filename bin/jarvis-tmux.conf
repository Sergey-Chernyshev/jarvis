# tmux-конфиг отдельного сервера Jarvis (-L jarvis).
# Цель: tmux незаметен — выглядит и ведёт себя как обычный терминал.

set -g status off
# mouse on: tmux сам перехватывает колесо и уходит в copy-mode (скроллит свой
# scrollback с inline-транскриптом Claude Code). Иначе wheel→стрелки делает
# ВНЕШНИЙ терминал (для него alt-screen приложение — это сам tmux), стрелки
# летят сквозь tmux в Claude Code, и он ругается «Scroll wheel is sending
# arrow keys». mouse on = скролл работает, без предупреждения.
set -g mouse on
set -g history-limit 100000

# При каждом new-session tmux копирует сетевой контекст текущего терминала в
# server environment; отсутствующие переменные удаляются. Это сохраняет proxy/
# CA routing без помещения credentials в shell-command и process argv.
set -g update-environment "DISPLAY KRB5CCNAME SSH_ASKPASS SSH_AUTH_SOCK SSH_AGENT_PID SSH_CONNECTION WINDOWID XAUTHORITY HTTP_PROXY HTTPS_PROXY ALL_PROXY http_proxy https_proxy all_proxy NO_PROXY no_proxy ANTHROPIC_BASE_URL NODE_EXTRA_CA_CERTS JARVIS_SHIM JARVIS_DIR"

# Корректные цвета в современных терминалах
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,iterm2:Tc"

# Без задержки Esc (важно для TUI вроде Claude Code)
set -s escape-time 0

# Прокидываем focus-события в TUI (Claude Code/vim знают, когда панель в фокусе)
set -g focus-events on

# При закрытии сессии — отваливаемся из tmux, а не прыгаем в другую сессию
set -g detach-on-destroy on

# Терминал подписывает сам себя: имя tmux-окна → заголовок окна терминала
# (в iTerm2 c -CC имена окон становятся именами табов и без этого)
set -g set-titles on
set -g set-titles-string "#W"
set -g automatic-rename off
