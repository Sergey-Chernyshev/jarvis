<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Jarvis · агент</title>
<style>
  :root{
    --fg:#e9edf2; --dim:#8b93a1; --line:rgba(255,255,255,.08);
    --user:rgba(90,140,255,.18); --bot:rgba(255,255,255,.055);
    --accent:#5b8cff; --ok:#3ecf8e; --no:#ff6b6b; --warn:#ffcc66;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    font:13px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text",sans-serif;
    color:var(--fg); background:transparent; overflow:hidden;
    display:flex; flex-direction:column; -webkit-user-select:none; user-select:none;
  }
  /* header (draggable) */
  header{
    -webkit-app-region:drag; flex:0 0 auto;
    display:flex; align-items:center; gap:8px;
    padding:12px 14px; border-bottom:1px solid var(--line);
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .title{font-weight:600;letter-spacing:.2px}
  .sub{color:var(--dim);font-size:11px;margin-left:auto}
  /* messages */
  #msgs{flex:1 1 auto; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:10px}
  #msgs::-webkit-scrollbar{width:8px}
  #msgs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:8px}
  .msg{display:flex}
  .msg.user{justify-content:flex-end}
  .bubble{
    max-width:80%; padding:8px 11px; border-radius:13px;
    background:var(--bot); border:1px solid var(--line);
    white-space:pre-wrap; word-break:break-word; -webkit-user-select:text; user-select:text;
  }
  .msg.user .bubble{background:var(--user); border-color:rgba(90,140,255,.28)}
  .msg.err .bubble{background:rgba(255,107,107,.14); border-color:rgba(255,107,107,.3)}
  .chip{
    font-size:11px; color:var(--dim); padding:4px 9px; border-radius:9px;
    background:rgba(255,255,255,.04); border:1px solid var(--line); font-family:ui-monospace,monospace;
  }
  /* confirm card */
  .msg.confirm{justify-content:stretch}
  .cbox{
    width:100%; padding:11px 12px; border-radius:13px;
    background:rgba(255,204,102,.06); border:1px solid rgba(255,204,102,.22);
  }
  .ctitle{font-weight:600;margin-bottom:3px}
  .cdesc{color:var(--fg);font-size:12px;margin-bottom:6px;-webkit-user-select:text;user-select:text}
  .cwarn{color:var(--warn);font-size:11px;margin-bottom:7px}
  .cbtns{display:flex;gap:8px}
  .cbtn{
    flex:1; padding:7px 0; border-radius:9px; border:1px solid var(--line);
    background:rgba(255,255,255,.05); color:var(--fg); cursor:pointer; font:inherit; font-weight:600;
  }
  .cbtn.yes{background:rgba(62,207,142,.16);border-color:rgba(62,207,142,.35);color:var(--ok)}
  .cbtn.no{background:rgba(255,107,107,.13);border-color:rgba(255,107,107,.3);color:var(--no)}
  .cbtn:hover{filter:brightness(1.15)}
  .cresult{margin-top:6px;font-size:12px;color:var(--dim)}
  .hint{color:var(--dim);text-align:center;font-size:12px;margin:auto}
  /* composer */
  footer{flex:0 0 auto; padding:10px 12px; border-top:1px solid var(--line); display:flex; gap:8px; align-items:flex-end}
  #input{
    flex:1; resize:none; max-height:120px; min-height:38px;
    padding:9px 11px; border-radius:11px; border:1px solid var(--line);
    background:rgba(255,255,255,.05); color:var(--fg); font:inherit; outline:none;
    -webkit-user-select:text; user-select:text;
  }
  #input:focus{border-color:rgba(91,140,255,.5)}
  #send{
    flex:0 0 auto; width:40px; height:38px; border-radius:11px; border:1px solid rgba(91,140,255,.4);
    background:rgba(91,140,255,.18); color:var(--fg); font-size:15px; cursor:pointer;
  }
  #send:disabled{opacity:.5;cursor:default}
</style>
</head>
<body>
  <header data-tauri-drag-region>
    <span class="dot"></span>
    <span class="title">Jarvis · агент</span>
    <span class="sub" id="sub">готов</span>
  </header>
  <div id="msgs">
    <div class="hint">Спроси агента о сессиях, лимитах, метриках.<br/>Действия (ответ в сессию, смена настроек) он подтвердит у тебя карточкой.</div>
  </div>
  <footer>
    <textarea id="input" rows="1" placeholder="Сообщение агенту…  (Enter — отправить)"></textarea>
    <button id="send">⏎</button>
  </footer>
  <script src="agent-chat.js"></script>
</body>
</html>
